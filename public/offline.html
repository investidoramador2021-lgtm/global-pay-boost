<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Offline — MRC GlobalPay</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0F1117;color:#e2e8f0;font-family:system-ui,sans-serif;text-align:center;padding:2rem}
    .card{max-width:420px}
    h1{font-size:1.5rem;margin-bottom:.75rem;color:#00FFA3}
    p{line-height:1.6;margin-bottom:1rem;color:#94a3b8}
    button{background:#00FFA3;color:#0F1117;border:none;padding:.75rem 1.5rem;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:1rem}
    button:hover{opacity:.9}
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
