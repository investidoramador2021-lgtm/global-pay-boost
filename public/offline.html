<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Offline — MRC GlobalPay</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0F1117;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:2rem}
    .logo{font-size:1.25rem;font-weight:700;margin-bottom:2.5rem;letter-spacing:-.02em}
    .logo span{color:#00FFA3}
    .icon{width:72px;height:72px;margin:0 auto 1.5rem;border-radius:50%;background:rgba(0,255,163,.08);display:flex;align-items:center;justify-content:center;animation:pulse 2.5s ease-in-out infinite}
    .icon svg{width:32px;height:32px;stroke:#00FFA3;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,163,.15)}50%{box-shadow:0 0 0 16px rgba(0,255,163,0)}}
    .card{max-width:380px}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;color:#fff}
    .sub{font-size:.875rem;line-height:1.6;margin-bottom:1.75rem;color:#94a3b8}
    .btn{background:#00FFA3;color:#0F1117;border:none;padding:.75rem 2rem;border-radius:.625rem;font-weight:700;cursor:pointer;font-size:.9375rem;transition:opacity .15s,transform .15s;display:inline-flex;align-items:center;gap:.5rem}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none}
    .footer{position:fixed;bottom:1.5rem;font-size:.6875rem;color:#475569;letter-spacing:.02em}
    .footer a{color:#00FFA3;text-decoration:none}
  </style>
</head>
<body>
  <div class="logo">MRC<span>GlobalPay</span></div>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
    </div>
    <h1>You're Offline</h1>
    <p class="sub">No internet connection detected. Your swap data is safe — reconnect and pick up right where you left off.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Try Again
    </button>
  </div>
  <div class="footer">FINTRAC Registered MSB C100000015 · <a href="https://mrcglobalpay.com">mrcglobalpay.com</a></div>
</body>
</html>
